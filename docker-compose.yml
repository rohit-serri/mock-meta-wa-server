version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mock-meta-wa-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mock_waba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
